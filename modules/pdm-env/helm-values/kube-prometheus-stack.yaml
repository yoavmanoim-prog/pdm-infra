# Helm value overrides for kube-prometheus-stack.
# Sensitive values (${grafana_password}, ${slack_webhook_url}) are
# injected by Terraform from AWS Secrets Manager — never hardcoded here.

grafana:
  adminPassword: "${grafana_password}"

  # Allow Prometheus to discover ServiceMonitor resources in all namespaces,
  # not just the monitoring namespace where the stack itself is installed.
  sidecar:
    dashboards:
      enabled: true
      searchNamespace: ALL   # picks up ConfigMap dashboards from every namespace

prometheus:
  prometheusSpec:
    # scrape ServiceMonitors from any namespace — required so pdm-backend's
    # ServiceMonitor (deployed in pdm-production) is picked up automatically
    serviceMonitorSelectorNilUsesHelmValues: false
    serviceMonitorNamespaceSelector: {}
    serviceMonitorSelector: {}

alertmanager:
  config:
    global:
      resolve_timeout: 5m

    route:
      receiver: slack-pdm
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 1h

    receivers:
      - name: slack-pdm
        slack_configs:
          - api_url: "${slack_webhook_url}"
            channel: "#pdm-alerts"
            send_resolved: true
            title: '{{ .CommonAnnotations.summary }}'
            text: '{{ .CommonAnnotations.description }}'
