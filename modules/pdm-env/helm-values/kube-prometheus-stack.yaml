# Helm value overrides for kube-prometheus-stack.
# Sensitive values (${grafana_password}, ${slack_webhook_url}) are
# injected by Terraform from AWS Secrets Manager — never hardcoded here.

grafana:
  adminPassword: "${grafana_password}"

  # Expose the Grafana UI on a free nip.io domain via the shared nginx ingress.
  # grafana.<elb-ip>.nip.io resolves to the ingress LoadBalancer; nginx routes by
  # Host header (same pattern as ArgoCD / staging). HTTP only — no cert needed.
  ingress:
    enabled: true
    ingressClassName: nginx
    hosts:
      - grafana.52.202.248.204.nip.io
    path: /
    pathType: Prefix

  # tell Grafana its external URL so generated links / redirects are correct
  grafana.ini:
    server:
      domain: grafana.52.202.248.204.nip.io
      root_url: "http://grafana.52.202.248.204.nip.io"

  # Allow Prometheus to discover ServiceMonitor resources in all namespaces,
  # not just the monitoring namespace where the stack itself is installed.
  sidecar:
    dashboards:
      enabled: true
      searchNamespace: ALL   # picks up ConfigMap dashboards from every namespace

prometheus:
  prometheusSpec:
    # scrape ServiceMonitors from any namespace — required so pdm-backend's
    # ServiceMonitor (deployed in pdm-production) is picked up automatically
    serviceMonitorSelectorNilUsesHelmValues: false
    serviceMonitorNamespaceSelector: {}
    serviceMonitorSelector: {}

alertmanager:
  config:
    global:
      resolve_timeout: 5m

    route:
      receiver: slack-pdm
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 1h

    receivers:
      - name: slack-pdm
        slack_configs:
          - api_url: "${slack_webhook_url}"
            channel: "#pdm-alerts"
            send_resolved: true
            title: '{{ .CommonAnnotations.summary }}'
            text: '{{ .CommonAnnotations.description }}'
